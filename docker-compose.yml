version: "3.8"

networks:
  orkestri_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  evolution_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: orkestri_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB obrigatorio}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER obrigatorio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
    # Tuning conservador para Lightsail 2GB: shared_buffers=128M, effective_cache_size=384M
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
      -c log_min_duration_statement=2000
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - orkestri_net
    mem_limit: 384m
    memswap_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: orkestri_redis
    restart: unless-stopped
    # maxmemory 64M + policy allkeys-lru: cache leve, evicta o mais antigo se encher
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD obrigatorio} --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - orkestri_net
    mem_limit: 96m
    memswap_limit: 96m
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: orkestri/api:latest
    container_name: orkestri_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Heap do Node limitado a 512MB (container tem 768MB; sobra para libs nativas e Prisma engine).
      # Sem isso, o Node tenta usar ~70% da memória disponível e pode bater no mem_limit.
      NODE_OPTIONS: "--max-old-space-size=512"
      # connection_limit do Prisma: número máximo de conexões ao Postgres por instância do PrismaClient.
      # Com PrismaModule @Global (uma instância só), 10 conexões = teto seguro para max_connections=50 do PG.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=10&pool_timeout=20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      MASTER_EMAIL: ${MASTER_EMAIL:?MASTER_EMAIL obrigatorio}
      MASTER_PASSWORD: ${MASTER_PASSWORD:?MASTER_PASSWORD obrigatorio}
      MASTER_NOME: ${MASTER_NOME:-Administrator}
      TENANT_NOME: ${TENANT_NOME:-Orkestri}
      EVOLUTION_API_URL: http://orkestri_evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Orkestri}
      TZ: America/Sao_Paulo
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      MP_PLAN_BUSINESS_CLOUD: ${MP_PLAN_BUSINESS_CLOUD}
      MP_PLAN_BUSINESS_PLUS: ${MP_PLAN_BUSINESS_PLUS}
      ZABBIX_API_URL: ${ZABBIX_API_URL}
      ZABBIX_API_TOKEN: ${ZABBIX_API_TOKEN}
      N1_DB_HOST: ${N1_DB_HOST}
      N1_DB_PORT: ${N1_DB_PORT:-3306}
      N1_DB_USER: ${N1_DB_USER}
      N1_DB_PASS: ${N1_DB_PASS}
      N1_DB_NAME: ${N1_DB_NAME:-SGA_N1}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - orkestri_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 768m
    memswap_limit: 768m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: orkestri/frontend:latest
    container_name: orkestri_frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    environment:
      NODE_OPTIONS: "--max-old-space-size=256"
    mem_limit: 384m
    memswap_limit: 384m
    networks:
      - orkestri_net
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: orkestri_evolution
    restart: unless-stopped
    # Evolution geralmente usa ~50-200MB. 768MB é folga sem desperdício.
    mem_limit: 768m
    memswap_limit: 768m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      SERVER_URL: http://orkestri_evolution:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: orkestri_evolution_key
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      QRCODE_LIMIT: "30"
    networks:
      - orkestri_net

  sa_panel:
    build:
      context: ./saas/sa-panel
      dockerfile: Dockerfile
    container_name: orkestri_sa_panel
    restart: unless-stopped
    environment:
      PORT: 3001
      SA_TOKEN: ${SA_TOKEN:?SA_TOKEN obrigatorio}
    ports:
      - "8080:3001"
    volumes:
      - ./saas:/saas
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./saas/nginx-conf:/etc/nginx/conf.d
    networks:
      - orkestri_net
    mem_limit: 256m
    memswap_limit: 256m

  nginx:
    image: nginx:1.25-alpine
    container_name: orkestri_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - orkestri_net
    depends_on:
      - api
      - frontend
    mem_limit: 64m
    memswap_limit: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"