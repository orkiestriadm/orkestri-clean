version: "3.8"

networks:
  orkestri_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  evolution_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: orkestri_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orkestri}
      POSTGRES_USER: ${POSTGRES_USER:-orkestri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orkestri_secure_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - orkestri_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orkestri"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orkestri_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_2024}
    volumes:
      - redis_data:/data
    networks:
      - orkestri_net
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secure_2024}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: orkestri/api:latest
    container_name: orkestri_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      MASTER_EMAIL: ${MASTER_EMAIL:-sa@orkestri.local}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      MASTER_NOME: ${MASTER_NOME:-SA}
      TENANT_NOME: ${TENANT_NOME:-Orkestri}
      EVOLUTION_API_URL: http://orkestri_evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Orkestri}
      TZ: America/Sao_Paulo
    volumes:
      - uploads_data:/app/uploads
    networks:
      - orkestri_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: orkestri/frontend:latest
    container_name: orkestri_frontend
    restart: unless-stopped
    networks:
      - orkestri_net
    depends_on:
      - api

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: orkestri_evolution
    restart: unless-stopped
    mem_limit: 1.5g
    memswap_limit: 1.5g
    volumes:
      - evolution_data:/evolution/instances
    environment:
      SERVER_URL: http://orkestri_evolution:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: orkestri_evolution_key
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      QRCODE_LIMIT: "30"
    networks:
      - orkestri_net

  sa_panel:
    build:
      context: ./saas/sa-panel
      dockerfile: Dockerfile
    container_name: orkestri_sa_panel
    restart: unless-stopped
    environment:
      PORT: 3001
      SA_TOKEN: ${SA_TOKEN:-orkestri-sa-2024}
    ports:
      - "8080:3001"
    volumes:
      - ./saas:/saas
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - orkestri_net

  nginx:
    image: nginx:1.25-alpine
    container_name: orkestri_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - orkestri_net
    depends_on:
      - api
      - frontend