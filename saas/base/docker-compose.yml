version: "3.9"

# Template gerado por provision.sh — substitui variáveis {{VAR}}
# NÃO editar manualmente — use os scripts saas/

networks:
  ork_{{TENANT_SLUG}}_internal:
    driver: bridge
  orkestri_proxy:
    external: true

services:
  ork_{{TENANT_SLUG}}_postgres:
    image: postgres:16-alpine
    container_name: ork_{{TENANT_SLUG}}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - ork_{{TENANT_SLUG}}_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ork_{{TENANT_SLUG}}_redis:
    image: redis:7-alpine
    container_name: ork_{{TENANT_SLUG}}_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    networks:
      - ork_{{TENANT_SLUG}}_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ork_{{TENANT_SLUG}}_api:
    image: orkestri/api:latest
    container_name: ork_{{TENANT_SLUG}}_api
    restart: unless-stopped
    depends_on:
      ork_{{TENANT_SLUG}}_postgres:
        condition: service_healthy
      ork_{{TENANT_SLUG}}_redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ork_{{TENANT_SLUG}}_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MASTER_EMAIL: ${MASTER_EMAIL}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      MASTER_NOME: ${MASTER_NOME}
      TENANT_NOME: ${TENANT_NOME}
      APP_URL: ${APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-""}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-""}
      TZ: America/Sao_Paulo
    volumes:
      - ./data/uploads:/app/uploads
    networks:
      - ork_{{TENANT_SLUG}}_internal
      - orkestri_proxy
    labels:
      - "orkestri.tenant={{TENANT_SLUG}}"
      - "orkestri.service=api"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  ork_{{TENANT_SLUG}}_frontend:
    image: orkestri/frontend:latest
    container_name: ork_{{TENANT_SLUG}}_frontend
    restart: unless-stopped
    depends_on:
      - ork_{{TENANT_SLUG}}_api
    environment:
      NODE_ENV: production
    networks:
      - orkestri_proxy
    labels:
      - "orkestri.tenant={{TENANT_SLUG}}"
      - "orkestri.service=frontend"
