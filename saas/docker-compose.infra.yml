version: "3.9"
# Infra compartilhada — nginx proxy + SA Panel
# Execute: docker compose -f saas/docker-compose.infra.yml up -d

networks:
  orkestri_proxy:
    external: true

services:
  ork_nginx:
    image: nginx:1.25-alpine
    container_name: ork_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/conf.d:/etc/nginx/conf.d  # configs dinâmicas montadas pelo host
      - /etc/letsencrypt:/etc/letsencrypt:ro  # certificados SSL (opcional)
    networks:
      - orkestri_proxy
    depends_on:
      - ork_sa_panel

  ork_sa_panel:
    build: ./sa-panel
    container_name: ork_sa_panel
    restart: unless-stopped
    environment:
      PORT: 3001
      SA_TOKEN: ${SA_TOKEN:-change-me-in-production}
    volumes:
      - ./tenants.json:/app/../tenants.json          # registro de tenants
      - ./tenants:/app/../tenants                    # diretórios dos tenants
      - /var/run/docker.sock:/var/run/docker.sock    # Docker socket para controlar containers
      - /etc/nginx/conf.d:/etc/nginx/conf.d          # escrever configs nginx
      - ./nginx/tenant.conf.template:/app/../nginx/tenant.conf.template:ro
      - ./base:/app/../base:ro
    networks:
      - orkestri_proxy
    ports:
      - "8080:3001"   # Acesso direto ao painel SA (proteger por firewall em produção)
