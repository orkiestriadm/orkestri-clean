# Overrides de produção — usar junto com docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# O que muda:
#   - nginx escuta 443 + 80, usa nginx-ssl.conf e bind-mounts do Let's Encrypt
#   - certbot: container que renova o certificado automaticamente a cada 12h
#   - Evolution ativo (sem override de replicas)
#   - SA Panel usa /var/run/docker.sock do Linux

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/letsencrypt:/etc/letsencrypt:ro
      - ./ssl/www:/var/www/certbot:ro
    depends_on:
      - api
      - frontend

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: orkestri_certbot
    restart: unless-stopped
    volumes:
      - ./ssl/letsencrypt:/etc/letsencrypt
      - ./ssl/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot -w /var/www/certbot;
          sleep 12h & wait $${!};
        done"

  sa_panel:
    environment:
      PORT: 3001
      SA_TOKEN: ${SA_TOKEN}
      SA_ALLOWED_ORIGINS: ${SA_ALLOWED_ORIGINS:-https://orkiestri.com}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@orkiestri.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Orkiestri}
      APP_URL: ${APP_URL:-https://orkiestri.com}
    volumes:
      - ./saas:/saas
      - /var/run/docker.sock:/var/run/docker.sock
      - ./saas/nginx-conf:/etc/nginx/conf.d
