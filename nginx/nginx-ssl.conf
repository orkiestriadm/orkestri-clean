events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 20M;

  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json image/svg+xml font/truetype font/opentype;

  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/s;

  proxy_connect_timeout 10s;
  proxy_send_timeout    30s;
  proxy_read_timeout    60s;
  proxy_buffer_size     4k;
  proxy_buffers         8 16k;
  proxy_busy_buffers_size 32k;

  upstream api {
    server orkestri_api:3000;
    keepalive 32;
  }

  upstream frontend {
    server orkestri_frontend:3000;
    keepalive 16;
  }

  # ── HTTP: certbot challenge + redirect para HTTPS ──────────────────────────
  server {
    listen 80;
    server_name orkiestri.com www.orkiestri.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name orkiestri.com www.orkiestri.com;

    ssl_certificate     /etc/letsencrypt/live/orkiestri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orkiestri.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    location = /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /api/auth/login {
      limit_req        zone=login_limit burst=5 nodelay;
      limit_req_status 429;
      proxy_pass         http://api/auth/login;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   Connection        "";
    }

    location /api/ {
      limit_req        zone=api_limit burst=200 nodelay;
      proxy_pass         http://api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   Connection        "";
      proxy_next_upstream error timeout invalid_header http_502 http_503;
    }

    location /_next/static/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   Connection "";
      add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   Connection      "";
    }

    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_redirect     off;
    }
  }
}
