events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 20M;

  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json image/svg+xml font/truetype font/opentype;

  limit_req_zone $binary_remote_addr zone=login_limit:10m  rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/s;
  limit_req_zone $binary_remote_addr zone=export_limit:10m rate=5r/m;

  proxy_connect_timeout 10s;
  proxy_send_timeout    30s;
  proxy_read_timeout    60s;
  proxy_buffer_size     4k;
  proxy_buffers         8 16k;
  proxy_busy_buffers_size 32k;

  # Docker internal DNS — re-resolve on container recreate
  resolver 127.0.0.11 valid=30s ipv6=off;

  # ── HTTP: certbot challenge + redirect para HTTPS ──────────────────────────
  server {
    listen 80;
    server_name orkiestri.com www.orkiestri.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name orkiestri.com www.orkiestri.com;

    ssl_certificate     /etc/letsencrypt/live/orkiestri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orkiestri.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options    "nosniff"                                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # CSP: Next.js 14 (App Router + RSC) precisa de 'unsafe-inline' em script-src
    # para os <script>self.__next_f.push(...)</script> que carregam o tree de
    # Server Components — sem isso o React não consegue hidratar e a tela fica
    # branca/em estado inicial (animações framer-motion travam em opacity:0).
    # Risco baixo: esses inline scripts são gerados pelo próprio SSR, não vem
    # de input do usuário. Alternativa mais rigorosa seria nonces dinâmicos,
    # mas exigiria middleware Next.js e header customizado.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

    location = /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /api/auth/login {
      limit_req        zone=login_limit burst=5 nodelay;
      limit_req_status 429;
      set $api_up http://orkestri_api:3000;
      proxy_pass         $api_up;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   Connection        "";
    }

    location ~* /api/.*/(export|csv|relatorio|download) {
      limit_req        zone=export_limit burst=3 nodelay;
      limit_req_status 429;
      set $api_up http://orkestri_api:3000;
      proxy_pass         $api_up;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   Connection        "";
    }

    location /api/ {
      limit_req        zone=api_limit burst=200 nodelay;
      set $api_up http://orkestri_api:3000;
      proxy_pass         $api_up;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   Connection        "";
    }

    location /_next/static/ {
      set $fe_up http://orkestri_frontend:3000;
      proxy_pass         $fe_up;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   Connection "";
      add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/ {
      set $fe_up http://orkestri_frontend:3000;
      proxy_pass         $fe_up;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   Connection      "";
    }

    location / {
      set $fe_up http://orkestri_frontend:3000;
      proxy_pass         $fe_up;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_redirect     off;
    }
  }
}
