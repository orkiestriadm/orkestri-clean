events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;

  # Gzip — comprime JSON, JS, CSS, SVG
  gzip              on;
  gzip_vary         on;
  gzip_comp_level   5;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/truetype
    font/opentype
    application/vnd.ms-fontobject;

  client_max_body_size 20M;

  # Timeouts globais
  proxy_connect_timeout  10s;
  proxy_send_timeout     30s;
  proxy_read_timeout     60s;

  # Buffers — evita disco temporário para respostas pequenas/médias
  proxy_buffer_size       4k;
  proxy_buffers           8 16k;
  proxy_busy_buffers_size 32k;

  # Upstreams com keepalive — reutiliza conexões TCP entre requests
  upstream api {
    server orkestri_api:3000;
    keepalive 32;
  }

  upstream frontend {
    server orkestri_frontend:3000;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;

    location /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location /api/ {
      proxy_pass         http://api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_next_upstream error timeout invalid_header http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    location /_next/static/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   Connection "";
      add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   Connection      "";
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade         $http_upgrade;
      proxy_set_header   Connection      "upgrade";
      proxy_redirect     off;
    }
  }
}
