events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;

  # Gzip — comprime JSON, JS, CSS, SVG
  gzip              on;
  gzip_vary         on;
  gzip_comp_level   5;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/truetype
    font/opentype
    application/vnd.ms-fontobject;

  server_tokens off;

  client_max_body_size 20M;

  # Rate limiting (login: 10r/m por IP, API geral: 60r/s)
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/s;

  # Timeouts globais
  proxy_connect_timeout  10s;
  proxy_send_timeout     30s;
  proxy_read_timeout     60s;

  # Buffers
  proxy_buffer_size       4k;
  proxy_buffers           8 16k;
  proxy_busy_buffers_size 32k;

  # IP real do cliente quando há load balancer na frente
  real_ip_header    X-Forwarded-For;
  real_ip_recursive on;

  # Upstreams com keepalive
  upstream api {
    server orkestri_api:3000;
    keepalive 32;
  }

  upstream frontend {
    server orkestri_frontend:3000;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;

    # ── Security headers ─────────────────────────────────────────────────────
    # HSTS: seguro porque o LB garante que tráfego de usuário chega via HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Health check do LB (sem log, sem overhead) ───────────────────────────
    location = /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    # ── Login: rate limit mais restrito no proxy ─────────────────────────────
    location = /api/auth/login {
      limit_req        zone=login_limit burst=5 nodelay;
      limit_req_status 429;
      proxy_pass         http://api/auth/login;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header   Connection        "";
    }

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
      limit_req        zone=api_limit burst=200 nodelay;
      proxy_pass         http://api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header   Connection        "";
      proxy_next_upstream error timeout invalid_header http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    # ── Arquivos estáticos Next.js (cache agressivo) ─────────────────────────
    location /_next/static/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   Connection "";
      add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   Connection      "";
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Tudo mais → Next.js ──────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_redirect     off;
    }
  }
}
